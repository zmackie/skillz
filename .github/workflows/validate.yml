name: Validate skills & plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          echo "Checking plugin.json exists and is valid JSON..."
          jq empty .claude-plugin/plugin.json

          echo "Checking required fields..."
          jq -e '.name' .claude-plugin/plugin.json > /dev/null
          jq -e '.version' .claude-plugin/plugin.json > /dev/null
          jq -e '.description' .claude-plugin/plugin.json > /dev/null

      - name: Validate skill directories
        run: |
          echo "Checking each skill has a SKILL.md..."
          errors=0
          for dir in skills/*/; do
            skill=$(basename "$dir")
            if [ ! -f "$dir/SKILL.md" ]; then
              echo "ERROR: $skill is missing SKILL.md"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors skill(s) missing SKILL.md"
            exit 1
          fi
          echo "All skills have SKILL.md"
